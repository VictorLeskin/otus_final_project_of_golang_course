version: '3.8' 
 
services: 
  app: 
    build: . 
    ports: 
      - "8080:8080" 
    environment: 
      - DB_HOST=postgres 
    depends_on: 
      - postgres 
 
  postgres: 
    image: postgres:15-alpine 
    environment: 
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: antibruteforce 
    ports: 
      - "5432:5432" 
    volumes: 
      - postgres_data:/var/lib/postgresql/data 
 
volumes: 
  postgres_data: 
